<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUJILLO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #04060a;
            --bg2:      #080c12;
            --accent:   #e63946;
            --accent2:  #ff6b6b;
            --text:     #eef0f4;
            --text2:    #7a8494;
            --border:   rgba(255,255,255,0.07);
            --mono:     'Space Mono', monospace;
            --display:  'Syne', sans-serif;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--display);
            overflow: hidden;
        }

        /* ── FONDO ANIMADO ── */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(230,57,70,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(230,57,70,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0%   { transform: translateY(0); }
            100% { transform: translateY(60px); }
        }

        .bg-glow {
            position: fixed; z-index: 0;
            width: 700px; height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(230,57,70,0.12) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: glowPulse 4s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes glowPulse {
            0%,100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
            50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.1); }
        }

        .noise {
            position: fixed; inset: 0; z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.5; pointer-events: none;
        }

        /* Esquinas decorativas */
        .corner {
            position: fixed; z-index: 5;
            width: 36px; height: 36px;
            pointer-events: none;
        }
        .corner-tl { top:16px; left:16px;   border-top:1.5px solid rgba(230,57,70,0.4); border-left:1.5px solid rgba(230,57,70,0.4); }
        .corner-tr { top:16px; right:16px;  border-top:1.5px solid rgba(230,57,70,0.4); border-right:1.5px solid rgba(230,57,70,0.4); }
        .corner-bl { bottom:16px; left:16px;  border-bottom:1.5px solid rgba(230,57,70,0.4); border-left:1.5px solid rgba(230,57,70,0.4); }
        .corner-br { bottom:16px; right:16px; border-bottom:1.5px solid rgba(230,57,70,0.4); border-right:1.5px solid rgba(230,57,70,0.4); }

        /* ── CONTENEDOR CENTRAL ── */
        .center {
            position: relative; z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 32px;
        }

        /* ── EYEBROW ── */
        .eyebrow {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 0.6s 0.2s ease both;
        }

        /* ── LOGO ── */
        .logo {
            font-family: var(--display);
            font-size: clamp(64px, 10vw, 120px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--text);
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeUp 0.7s 0.35s ease both;
        }

        .logo span {
            color: var(--accent);
            text-shadow: 0 0 60px rgba(230,57,70,0.5);
        }

        /* ── TAGLINE ── */
        .tagline {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text2);
            letter-spacing: 0.06em;
            text-align: center;
            max-width: 380px;
            line-height: 1.7;
            margin-bottom: 52px;
            opacity: 0;
            animation: fadeUp 0.7s 0.5s ease both;
        }

        /* ── CAJA DE ACCESO ── */
        .access-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 320px;
            opacity: 0;
            animation: fadeUp 0.7s 0.65s ease both;
        }

        .input-wrap {
            position: relative;
            width: 100%;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 48px 14px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            letter-spacing: 0.15em;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .input-wrap input::placeholder {
            color: var(--text2);
            letter-spacing: 0.1em;
        }

        .input-wrap input:focus {
            border-color: rgba(230,57,70,0.6);
            box-shadow: 0 0 20px rgba(230,57,70,0.15);
        }

        .input-wrap input.error {
            border-color: var(--accent);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX(8px); }
            60%      { transform: translateX(-5px); }
            80%      { transform: translateX(5px); }
        }

        .eye-btn {
            position: absolute;
            right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--text2); cursor: pointer;
            font-size: 14px; padding: 0;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: var(--text); }

        .access-btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #c1121f);
            color: #fff;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(.16,1,.3,1);
            box-shadow: 0 0 24px rgba(230,57,70,0.3);
            position: relative;
            overflow: hidden;
        }

        .access-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .access-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(230,57,70,0.5), 0 8px 20px rgba(0,0,0,0.3);
        }
        .access-btn:hover::before { opacity: 1; }
        .access-btn:active { transform: translateY(0); }

        /* ── MENSAJE DE ERROR ── */
        .error-msg {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.1em;
            height: 16px;
            transition: opacity 0.3s;
            opacity: 0;
        }
        .error-msg.show { opacity: 1; }

        /* ── VERSIÓN ── */
        .version {
            position: fixed;
            bottom: 24px; right: 28px;
            font-family: var(--mono);
            font-size: 10px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.1em;
            z-index: 10;
        }

        /* ── LÍNEA DECORATIVA ── */
        .deco-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(230,57,70,0.4), transparent);
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ── OVERLAY DE CARGA ── */
        .loading-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .loading-text {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%,100% { opacity:1; }
            50%      { opacity:0.3; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="noise"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="center">
        <div class="deco-line"></div>
        <div class="eyebrow">Sistema Profesional de Instalaciones</div>
        <div class="logo">TRUJ<span>I</span>LLO</div>
        <p class="tagline">Plataforma especializada en automatización de instalaciones domiciliarias. Acceso restringido.</p>

        <div class="access-box">
            <div class="input-wrap">
                <input type="password" id="passInput" placeholder="••••••••" autocomplete="off" />
                <button class="eye-btn" id="eyeBtn" tabindex="-1">👁</button>
            </div>
            <div class="error-msg" id="errorMsg">Clave incorrecta. Intenta nuevamente.</div>
            <button class="access-btn" id="accessBtn">Acceder al sistema →</button>
        </div>
    </div>

    <div class="version">v3.1 · 2026</div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">Iniciando sistema...</div>
    </div>

    <script>
        // ── CONFIGURACIÓN ──
        // Cambia esta clave por la que quieras
        const ACCESS_KEY = 'trujillo2026@';

        // Archivo real al que redirige (cámbialo al nombre que quieras)
        const TARGET = 'plataforma.html';

        // ── LÓGICA ──
        const input    = document.getElementById('passInput');
        const btn      = document.getElementById('accessBtn');
        const errorMsg = document.getElementById('errorMsg');
        const eyeBtn   = document.getElementById('eyeBtn');
        const overlay  = document.getElementById('loadingOverlay');

        // Mostrar/ocultar contraseña
        eyeBtn.addEventListener('click', () => {
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        // Enter en el input
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkAccess();
            errorMsg.classList.remove('show');
            input.classList.remove('error');
        });

        btn.addEventListener('click', checkAccess);

        function checkAccess() {
            const val = input.value.trim();

            if (val === ACCESS_KEY) {
                // Correcto — mostrar overlay y redirigir
                overlay.classList.add('active');
                setTimeout(() => {
                    window.location.href = TARGET;
                }, 1200);
            } else {
                // Incorrecto — shake + mensaje
                input.classList.add('error');
                errorMsg.classList.add('show');
                input.value = '';
                setTimeout(() => input.classList.remove('error'), 500);
            }
        }

        // Focus automático
        setTimeout(() => input.focus(), 800);
    </script>
</body>
</html>
