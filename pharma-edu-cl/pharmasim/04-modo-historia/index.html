<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sé el Químico Farmacéutico — PharmaSim Lab</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-inner">
        <a href="../../index.html" class="nav-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
            PharmaLab
        </a>
        <div class="nav-center">
            <span class="mod-badge">04</span>
            <span class="nav-title">Sé el Químico Farmacéutico</span>
        </div>
        <div class="nav-right">
            <div class="score-badge" id="scoreBadge" style="display:none">
                ⭐ <span class="pts" id="liveScore">0</span> / 100
            </div>
        </div>
    </div>
</nav>

<div class="stepper hidden" id="stepper">
    <div class="stepper-inner" id="stepperInner"></div>
</div>

<div class="main-content">
    <!-- CASE SELECTION -->
    <div id="screenCases">
        <div class="welcome-hero">
            <h1>Sé el <span>Químico Farmacéutico</span></h1>
            <p>Un paciente te necesita. Selecciona un caso clínico, elige el tratamiento correcto, calcula la dosis, emite la receta y educa al paciente. Cada decisión tiene consecuencias.</p>
        </div>
        <div class="cases-grid" id="casesGrid"></div>
    </div>

    <!-- GAME PHASES -->
    <div id="screenGame" class="hidden"></div>

    <!-- RESULTS -->
    <div id="screenResults" class="hidden"></div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="patient-engine.js"></script>
<script src="prescription.js"></script>
<script src="dispensation.js"></script>
<script src="main.js"></script>
